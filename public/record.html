<!DOCTYPE html>
<html>
<head>
<title>RadKit Recording</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #1a1a2e;
    color: #e0e0e0;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
    overflow: hidden;
  }
  .container {
    text-align: center;
    padding: 32px;
    width: 100%;
    max-width: 400px;
  }
  h2 {
    font-size: 18px;
    margin-bottom: 24px;
    color: #fff;
  }
  .controls {
    display: flex;
    flex-direction: column;
    gap: 16px;
    align-items: center;
  }
  .options {
    display: flex;
    gap: 16px;
    justify-content: center;
    width: 100%;
  }
  .option-group {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .option-group label {
    font-size: 12px;
    color: #aaa;
    text-align: left;
  }
  select {
    padding: 8px 12px;
    border-radius: 8px;
    border: 1px solid #333;
    background: #2a2a3e;
    color: #fff;
    font-size: 14px;
    cursor: pointer;
  }
  .btn {
    padding: 12px 32px;
    border: none;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
  }
  .btn:active { transform: scale(0.97); }
  .btn-start {
    background: #e53935;
    color: #fff;
  }
  .btn-start:hover { background: #c62828; }
  .btn-stop {
    background: #555;
    color: #fff;
  }
  .btn-stop:hover { background: #444; }
  .btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }
  .timer {
    font-size: 48px;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
    color: #fff;
    margin: 8px 0;
  }
  .timer.recording-active {
    color: #e53935;
  }
  .status {
    font-size: 13px;
    color: #aaa;
    min-height: 20px;
  }
  .pulse {
    display: inline-block;
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: #e53935;
    margin-right: 6px;
    animation: pulse 1s infinite;
    vertical-align: middle;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }
</style>
</head>
<body>
<div class="container">
  <h2>Screen Recording</h2>
  <div class="controls">
    <div class="options" id="options">
      <div class="option-group">
        <label>Duration limit</label>
        <select id="duration">
          <option value="10">10 seconds</option>
          <option value="15">15 seconds</option>
          <option value="30" selected>30 seconds</option>
          <option value="45">45 seconds</option>
          <option value="60">60 seconds</option>
        </select>
      </div>
      <div class="option-group">
        <label>Frame rate</label>
        <select id="framerate">
          <option value="15">15 fps</option>
          <option value="24">24 fps</option>
          <option value="30" selected>30 fps</option>
        </select>
      </div>
    </div>
    <div class="timer" id="timer">0:00</div>
    <div>
      <button class="btn btn-start" id="startBtn">Start Recording</button>
      <button class="btn btn-stop" id="stopBtn" style="display:none;">Stop Recording</button>
    </div>
    <div class="status" id="status">Choose settings and click Start</div>
  </div>
</div>
<script src="record.js"></script>
</body>
</html>
