<!DOCTYPE html>
<html>
<head>
  <title>RadKit Recording</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
    }

    /* --- Countdown overlay (shown during pre-record delay) --- */
    #countdown-overlay {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    #countdown-overlay .spinner {
      width: 48px;
      height: 48px;
      border: 4px solid rgba(255, 255, 255, 0.15);
      border-top-color: #ff4757;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    #countdown-overlay .label {
      font-size: 16px;
      font-weight: 500;
      color: #ccc;
    }

    /* --- Compact control bar (shown during recording) --- */
    #control-bar {
      display: none;
      align-items: center;
      gap: 10px;
      background: #16213e;
      border: 1px solid #0f3460;
      border-radius: 8px;
      padding: 8px 16px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
    }

    #control-bar .rec-dot {
      width: 10px;
      height: 10px;
      background: #ff4757;
      border-radius: 50%;
      animation: blink 1s ease-in-out infinite;
    }

    #control-bar .rec-dot.paused {
      animation: none;
      background: #ffa502;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    #control-bar .timer {
      font-variant-numeric: tabular-nums;
      font-size: 14px;
      min-width: 56px;
      text-align: center;
    }

    #control-bar button {
      background: none;
      border: 1px solid #0f3460;
      border-radius: 6px;
      color: #e0e0e0;
      padding: 6px 12px;
      cursor: pointer;
      font-size: 13px;
      transition: background 0.15s;
    }

    #control-bar button:hover {
      background: rgba(255, 255, 255, 0.08);
    }

    #btn-stop {
      border-color: #ff4757;
      color: #ff4757;
    }

    #btn-discard {
      border-color: #666;
      color: #999;
    }

    /* --- Hidden state --- */
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <!-- Countdown shown during the pre-record delay -->
  <div id="countdown-overlay">
    <div class="spinner"></div>
    <div class="label">Starting recording...</div>
  </div>

  <!-- Compact control bar shown while recording -->
  <div id="control-bar">
    <div class="rec-dot" id="rec-dot"></div>
    <span class="timer" id="timer">0:00</span>
    <button id="btn-pause">Pause</button>
    <button id="btn-stop">Stop</button>
    <button id="btn-discard">Discard</button>
  </div>

  <script src="record.js"></script>
</body>
</html>
