<!DOCTYPE html>
<html>
<head>
<title>RadKit Recording</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #1a1a2e;
    color: #e0e0e0;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
    overflow: hidden;
  }
  .container {
    text-align: center;
    padding: 24px;
    width: 100%;
    max-width: 360px;
  }
  h2 {
    font-size: 18px;
    font-weight: 600;
    margin-bottom: 20px;
    color: #fff;
  }
  .controls {
    display: flex;
    flex-direction: column;
    gap: 14px;
    align-items: center;
  }
  .row {
    display: flex;
    gap: 12px;
    align-items: center;
    justify-content: center;
    width: 100%;
  }
  label {
    font-size: 13px;
    color: #aaa;
    white-space: nowrap;
  }
  select, input[type="number"] {
    background: #2a2a3e;
    border: 1px solid #3a3a5e;
    color: #e0e0e0;
    padding: 6px 10px;
    border-radius: 6px;
    font-size: 13px;
    outline: none;
  }
  select:focus, input[type="number"]:focus {
    border-color: #6c63ff;
  }
  input[type="number"] {
    width: 64px;
    text-align: center;
  }
  .record-btn {
    width: 56px;
    height: 56px;
    border-radius: 50%;
    border: 3px solid #e0e0e0;
    background: transparent;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.15s;
    margin-top: 8px;
  }
  .record-btn:hover { transform: scale(1.08); }
  .record-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
  .record-btn .inner {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: #e53935;
    transition: border-radius 0.2s, width 0.2s, height 0.2s;
  }
  .record-btn.recording .inner {
    width: 20px;
    height: 20px;
    border-radius: 4px;
  }
  .timer {
    font-size: 28px;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
    color: #fff;
    min-height: 36px;
  }
  .timer.recording-active { color: #e53935; }
  .status {
    font-size: 13px;
    color: #888;
    min-height: 20px;
    margin-top: 4px;
  }
  .status.error { color: #e53935; }
</style>
</head>
<body>
<div class="container">
  <h2>Screen Recording</h2>
  <div class="controls">
    <div class="row">
      <label for="fps">Frame rate</label>
      <select id="fps">
        <option value="15">15 fps</option>
        <option value="30" selected>30 fps</option>
        <option value="60">60 fps</option>
      </select>
    </div>
    <div class="row">
      <label for="duration">Max duration</label>
      <input type="number" id="duration" value="30" min="5" max="60" step="5" />
      <label>seconds</label>
    </div>
    <div class="timer" id="timer">00:00</div>
    <button class="record-btn" id="recordBtn" title="Start recording">
      <div class="inner"></div>
    </button>
    <div class="status" id="status">Click the button to start</div>
  </div>
</div>
<script src="record.js"></script>
</body>
</html>
