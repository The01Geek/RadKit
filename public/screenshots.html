<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>RadKit — Screenshots</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #1a1a2e;
    color: #e0e0e0;
    min-height: 100vh;
  }
  .page {
    max-width: 800px;
    margin: 0 auto;
    padding: 40px 24px;
  }
  h1 {
    font-size: 22px;
    margin-bottom: 6px;
    color: #fff;
  }
  h1 .accent { color: #a173fe; }
  .subtitle {
    font-size: 13px;
    color: #888;
    margin-bottom: 28px;
  }
  .empty {
    text-align: center;
    padding: 60px 20px;
    color: #666;
    font-size: 15px;
  }
  .ss-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .ss-card {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 14px 18px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px;
    transition: border-color 0.2s;
  }
  .ss-card:hover {
    border-color: rgba(255,255,255,0.18);
  }
  .ss-thumb {
    width: 120px;
    height: 68px;
    border-radius: 6px;
    background: #000;
    flex-shrink: 0;
    object-fit: cover;
  }
  .ss-info {
    flex: 1;
    min-width: 0;
  }
  .ss-date {
    font-size: 14px;
    font-weight: 600;
    color: #fff;
    margin-bottom: 4px;
  }
  .ss-meta {
    font-size: 12px;
    color: #888;
    display: flex;
    gap: 12px;
  }
  .ss-actions {
    display: flex;
    gap: 8px;
    flex-shrink: 0;
  }
  .act-btn {
    padding: 7px 14px;
    font-size: 12px;
    font-weight: 600;
    border: none;
    border-radius: 7px;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
  }
  .act-btn:active { transform: scale(0.95); }
  .act-btn.download {
    background: rgba(67,160,71,0.2);
    color: #66bb6a;
  }
  .act-btn.download:hover { background: rgba(67,160,71,0.35); }
  .act-btn.delete {
    background: rgba(229,57,53,0.12);
    color: #e57373;
  }
  .act-btn.delete:hover { background: rgba(229,57,53,0.28); }
  .clear-all {
    margin-top: 24px;
    text-align: center;
  }
  .clear-all button {
    padding: 8px 20px;
    font-size: 13px;
    font-weight: 600;
    border: 1px solid rgba(229,57,53,0.3);
    border-radius: 8px;
    background: transparent;
    color: #e57373;
    cursor: pointer;
    transition: background 0.15s;
  }
  .clear-all button:hover {
    background: rgba(229,57,53,0.15);
  }
  .storage-info {
    margin-top: 16px;
    text-align: center;
    font-size: 12px;
    color: #666;
  }
</style>
</head>
<body>
<div class="page">
  <h1>Rad<span class="accent">Kit</span> — Screenshots</h1>
  <p class="subtitle" id="subtitle">Loading…</p>
  <div id="content"></div>
</div>
<script src="screenshots.js"></script>
</body>
</html>
