<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Webcam</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: transparent;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
    /* Dark fallback in case transparency isn't supported */
    background: #111;
  }
  video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 50%;
    transform: scaleX(-1);
    border: 3px solid rgba(255,255,255,0.2);
  }
</style>
</head>
<body>
<video id="cam" autoplay muted playsinline></video>
<script src="webcam.js"></script>
</body>
</html>
